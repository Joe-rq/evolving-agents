<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="bgGlow1" cx="12%" cy="12%" r="34%">
      <stop offset="0%" stop-color="#31B67A" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#31B67A" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="bgGlow2" cx="82%" cy="16%" r="36%">
      <stop offset="0%" stop-color="#1D70D6" stop-opacity="0.14" />
      <stop offset="100%" stop-color="#1D70D6" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="scarLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#31B67A" stop-opacity="0" />
      <stop offset="35%" stop-color="#31B67A" />
      <stop offset="65%" stop-color="#1D70D6" />
      <stop offset="90%" stop-color="#E47B2C" />
      <stop offset="100%" stop-color="#E47B2C" stop-opacity="0" />
    </linearGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" />
      <feOffset dx="0" dy="4" result="offsetblur" />
      <feFlood flood-color="#1D4D82" flood-opacity="0.10" result="shadowColor" />
      <feComposite in="shadowColor" in2="offsetblur" operator="in" result="shadow" />
      <feMerge><feMergeNode in="shadow" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

