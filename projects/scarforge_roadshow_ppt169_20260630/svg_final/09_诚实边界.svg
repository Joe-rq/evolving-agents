  <g id="p09-message">
    <text x="60" y="634" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="24" fill="#52657D">这不是软弱，这是可信产品该有的边界。我们讲一个<tspan font-weight="700" fill="#122033">可追溯的进化事件</tspan>，不把它包装成万能神话。</text>
