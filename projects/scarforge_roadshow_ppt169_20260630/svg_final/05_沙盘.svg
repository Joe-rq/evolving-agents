<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="scarLine5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#31B67A" stop-opacity="0" />
      <stop offset="35%" stop-color="#31B67A" />
      <stop offset="65%" stop-color="#1D70D6" />
      <stop offset="90%" stop-color="#E47B2C" />
      <stop offset="100%" stop-color="#E47B2C" stop-opacity="0" />
    </linearGradient>
    <filter id="cardShadow5" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="0" dy="3" result="offsetblur" />
      <feFlood flood-color="#1D4D82" flood-opacity="0.10" result="shadowColor" />
      <feComposite in="shadowColor" in2="offsetblur" operator="in" result="shadow" />
      <feMerge><feMergeNode in="shadow" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <g id="background">
    <rect width="1280" height="720" fill="#F4F9FF" />
  </g>

  <g id="p05-header">
    <text x="60" y="72" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="20" font-weight="600" fill="#1D70D6" letter-spacing="3">FIRST SANDBOX</text>
    <text x="60" y="152" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif" font-size="56" font-weight="900" fill="#122033">交易不是终点，</text>
    <text x="60" y="226" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif" font-size="56" font-weight="900" fill="#1D70D6">只是第一个可验证沙盘。</text>
    <text x="60" y="278" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="24" fill="#52657D">量化交易是第一个沙盘：反馈明确，失败可追溯。这个案例证明的不是"会交易"，而是 Agent 学会了<tspan font-weight="700" fill="#122033">换搜索结构</tspan>。</text>
  </g>

  
