    <path d="M9 9v-1a3 3 0 0 1 6 0v1" />
    <path d="M8 9h8a6 6 0 0 1 1 3v3a5 5 0 0 1 -10 0v-3a6 6 0 0 1 1 -3" />
    <path d="M3 13l4 0" />
    <path d="M17 13l4 0" />
    <path d="M12 20l0 -6" />
    <path d="M4 19l3.35 -2" />
    <path d="M20 19l-3.35 -2" />
    <path d="M4 7l3.75 2.4" />
    <path d="M20 7l-3.75 2.4" />
  </g>
    <text x="136" y="370" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="20" font-weight="700" fill="#52657D">TOP3000 / 大盘池塘</text>
    
    <text x="84" y="424" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="24" fill="#52657D">Sharpe</text>
    <text x="596" y="424" text-anchor="end" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="32" font-weight="700" fill="#D94B4B">2.15</text>
    <line x1="84" y1="438" x2="596" y2="438" stroke="#52657D" stroke-opacity="0.16" stroke-width="1" />
    <text x="84" y="472" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="24" fill="#52657D">self_corr</text>
    <text x="596" y="472" text-anchor="end" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="32" font-weight="700" fill="#D94B4B">0.78</text>
    <line x1="84" y1="486" x2="596" y2="486" stroke="#52657D" stroke-opacity="0.16" stroke-width="1" />
    <text x="84" y="510" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="24" fill="#52657D">result</text>
    <text x="596" y="510" text-anchor="end" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif" font-size="32" font-weight="900" fill="#D94B4B">FAIL</text>
  </g>

  
  <g id="card-pond-alive">
    <g filter="url(#cardShadow5)">
      <path fill="#F4FFF9" stroke="#15956B" stroke-opacity="0.38" stroke-width="1.5" d="M676,318 H1204 A16,16 0 0 1 1220,334 V502 A16,16 0 0 1 1204,518 H676 A16,16 0 0 1 660,502 V334 A16,16 0 0 1 676,318 Z" />
