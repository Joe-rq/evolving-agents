  <g id="p05-pivot">
    <text x="470" y="578" text-anchor="middle" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="22" font-weight="700" fill="#E47B2C">agent proposes</text>
    
  <g transform="translate(616, 556) scale(1.83333)" fill="none" stroke="#E47B2C" stroke-width="2">
    <path d="M5 12l14 0" />
    <path d="M13 18l6 -6" />
    <path d="M13 6l6 6" />
  </g>
    <text x="810" y="578" text-anchor="middle" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="22" font-weight="700" fill="#E47B2C">human approves</text>
  </g>
  <g id="p05-bridge">
    <path fill="#EAF3FF" stroke="#1D70D6" stroke-opacity="0.18" stroke-width="1" d="M70,610 H1210 A10,10 0 0 1 1220,620 V644 A10,10 0 0 1 1210,654 H70 A10,10 0 0 1 60,644 V620 A10,10 0 0 1 70,610 Z" />
    <text x="84" y="640" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif" font-size="24" font-weight="800" fill="#1D70D6">关键转折</text>
    <text x="204" y="640" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="24" fill="#52657D">答案没变，<tspan font-weight="700" fill="#E47B2C">环境变了。</tspan></text>
  </g>

  <g id="p05-footer">
    <rect x="60" y="678" width="1160" height="2" fill="url(#scarLine5)" />
    <text x="60" y="708" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="16" fill="#7B8DA3">乔木计划 · first sandbox, not final domain</text>
