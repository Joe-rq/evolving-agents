    <text x="684" y="424" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="24" fill="#52657D">Sharpe</text>
    <text x="1196" y="424" text-anchor="end" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="32" font-weight="700" fill="#15956B">2.15</text>
    <line x1="684" y1="438" x2="1196" y2="438" stroke="#52657D" stroke-opacity="0.16" stroke-width="1" />
    <text x="684" y="472" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="24" fill="#52657D">self_corr</text>
    <text x="1196" y="472" text-anchor="end" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="32" font-weight="700" fill="#15956B">0.68</text>
    <line x1="684" y1="486" x2="1196" y2="486" stroke="#52657D" stroke-opacity="0.16" stroke-width="1" />
    <text x="684" y="510" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="24" fill="#52657D">result</text>
    <text x="1196" y="510" text-anchor="end" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif" font-size="32" font-weight="900" fill="#15956B">PASS</text>
