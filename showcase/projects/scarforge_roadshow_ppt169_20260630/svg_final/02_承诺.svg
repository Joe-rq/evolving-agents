  <g id="p02-message">
    <text x="60" y="504" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="28" font-weight="400" fill="#52657D">痕进不是让 Agent 背更多上下文，而是让它学会长记性：</text>
    <text x="60" y="552" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="28" font-weight="400" fill="#52657D">错在哪里、为什么错、下次该避开哪条路，都留下<tspan font-weight="700" fill="#1D70D6">可追溯的痕迹</tspan>。</text>
  </g>

