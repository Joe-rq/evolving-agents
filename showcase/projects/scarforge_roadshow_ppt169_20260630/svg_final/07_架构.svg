    <text x="214" y="396" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="20" fill="#52657D">通用进化逻辑：记录失败、学习模式、更新规则、奖励新颖探索。</text>
    
