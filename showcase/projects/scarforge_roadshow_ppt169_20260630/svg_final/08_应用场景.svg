  <g id="p08-header">
    <text x="60" y="72" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="20" font-weight="600" fill="#1D70D6" letter-spacing="3">WHERE IT APPLIES</text>
    <text x="60" y="152" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif" font-size="56" font-weight="900" fill="#122033">凡是会试错的 Agent，</text>
    <text x="60" y="226" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif" font-size="56" font-weight="900" fill="#1D70D6">都需要一套失败进化机制。</text>
    <text x="60" y="278" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="24" fill="#52657D">量化交易只是第一个沙盘。痕进真正服务的是"可重复试错"的工作流：失败能被定义，反馈能被记录，下一次行动能被改变。</text>
  </g>

  
